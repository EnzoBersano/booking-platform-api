server:
  port: ${SPRING_PORT}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${EXPIRATION_TIME}

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  swagger-ui:
    path: /swagger-ui.html